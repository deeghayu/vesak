<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #050517;
            color: #fff;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Full Page Sections */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* First Page - Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1610444317135-64906f230752?auto=format&fit=crop&q=80&w=2070') center/cover;
        }

        .hero h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            margin: 0;
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            color: #ffd700;
            animation: bounce 2s infinite;
            text-decoration: none;
        }

        /* Second Page - Video Page */
        .video-page {
            background: #000;
        }

        .video-container {
            width: 80%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            position: relative;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
        }

        .btn {
            margin-top: 20px;
            background: #ffd700;
            color: #050517;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        footer {
            padding: 20px;
            background: #02020a;
            text-align: center;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- පළමු පිටුව -->
    <section class="hero">
        <h1>සම්බුදු තෙමඟුල</h1>
        <p style="font-size: 1.5rem;">වෙසක් අසිරිය විඳින්න පල්ලෙහාට යන්න...</p>
        <a href="#next-page" class="scroll-down">🔽 පහළට යන්න</a>
    </section>

    <!-- දෙවැනි පිටුව (Video Page) -->
    <section id="next-page" class="video-page">
        <h2 style="color: #ffd700; margin-bottom: 20px;">සංවේදී කවි පෙළ</h2>
        
        <div class="video-container">
            <!-- තත්පර 29 සිට පටන් ගන්නා වීඩියෝව (autoplay=1) -->
            <iframe id="vesakVideo" 
                src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=0&start=29&rel=0&modestbranding=1" 
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>
        </div>

        <button class="btn" onclick="playMusic()">🎶 සින්දුව ප්ලේ කරන්න</button>
        <div id="musicPlayer" style="display:none;"></div>
    </section>

    <footer>
        <p>Developed by M.U.R.D.D. Fonseka | Ziyumi Beat</p>
    </footer>

    <script>
        function playMusic() {
            const playerDiv = document.getElementById('musicPlayer');
            // සින්දුව (බුදු කරුණා දෑස තෙමී) ලෝඩ් කිරීම
            playerDiv.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            alert("දැන් මියුසික් එක ප්ලේ වෙනවා මචං!");
        }
    </script>

</body>
</html>
