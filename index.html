<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #050517;
            color: #fff;
            font-family: 'Abhaya Libre', serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section with Video Background */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 23, 0.6);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            margin-bottom: 20px;
        }

        /* Music Button Styling */
        .music-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            font-family: 'Abhaya Libre', serif;
        }

        .music-btn:hover {
            background: #ffd700;
            color: #050517;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 100px 20px;
            background: #050517;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            transition: 0.4s;
        }

        footer {
            padding: 40px;
            background: #02020a;
            color: #666;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="video-background">
            <!-- Background Video: සංවේදී කවිපෙළ -->
            <iframe id="heroVideo" src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=1&loop=1&playlist=SBRWnqemVJU&controls=0&showinfo=0" 
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1>සම්බුදු තෙමඟුල</h1>
            <p style="font-size: 1.5rem; margin-bottom: 30px;">වෙසක් අසිරියෙන් මුළු ලොවම ආලෝකමත් වේවා!</p>
            
            <!-- Music Toggle Button -->
            <button class="music-btn" onclick="toggleMusic()">🎶 සින්දුව වාදනය කරන්න</button>
            
            <!-- Hidden Music Iframe (බුදු කරුණා දෑස තෙමී) -->
            <div id="musicPlayer" style="display:none;"></div>
        </div>
    </section>

    <main class="container">
        <div class="event-card">
            <h2 style="color:#ffd700">උපත</h2>
            <p>ලුම්බිණි සල් උයනේදී සිදුහත් කුමරුගේ උපත සිදු විය.</p>
        </div>
        <div class="event-card">
            <h2 style="color:#ffd700">බුදුවීම</h2>
            <p>ගයා ශීර්ෂයේදී උතුම් සම්මා සම්බුද්ධත්වයට පත්වීම.</p>
        </div>
        <div class="event-card">
            <h2 style="color:#ffd700">පිරිනිවීම</h2>
            <p>කුසිනාරා නුවරදී මහා පිරිනිවන් පෑම.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Developed by M.U.R.D.D. Fonseka | Ziyumi Beat</p>
    </footer>

    <script>
        let isPlaying = false;
        function toggleMusic() {
            const playerDiv = document.getElementById('musicPlayer');
            const btn = document.querySelector('.music-btn');
            
            if (!isPlaying) {
                // සින්දුව ලෝඩ් කිරීම (YouTube ID: 7Jw9BAZh45w)
                playerDiv.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
                btn.innerHTML = "⏸️ සින්දුව නවත්වන්න";
                isPlaying = true;
            } else {
                playerDiv.innerHTML = "";
                btn.innerHTML = "🎶 සින්දුව වාදනය කරන්න";
                isPlaying = false;
            }
        }
    </script>

</body>
</html>
