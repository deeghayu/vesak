<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden; scroll-behavior: smooth;
            background: #050517; color: #fff;
        }

        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* Home Page Styling */
        .hero { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('hero.png') center/cover; text-align: center; }
        
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .video-container iframe { position: absolute; top: 50%; left: 50%; width: 100vw; height: 100vh; transform: translate(-50%, -50%); object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 2; }

        .facts-page { background: #050517; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 90%; max-width: 1200px; }
        
        .card {
            height: 400px; border-radius: 20px; overflow: hidden; cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.3); display: flex; flex-direction: column;
            justify-content: flex-end; padding: 25px; transition: 0.4s; position: relative;
        }
        .card:hover { transform: scale(1.03); border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        
        /* Card Backgrounds using your files */
        .c1 { background: linear-gradient(to top, #000, transparent), url('birth.jpg') center/cover; }
        .c2 { background: linear-gradient(to top, #000, transparent), url('images.jpg') center/cover; }
        .c3 { background: linear-gradient(to top, #000, transparent), url('z_p08-Sambuddha_2.jpg') center/cover; }

        /* Full Screen Details Page */
        #details-page {
            position: fixed; top: 0; left: 100%;
            width: 100%; height: 100%; background: #050517;
            z-index: 1000; transition: 0.5s ease-in-out;
            overflow-y: auto; box-sizing: border-box;
        }
        #details-page.active { left: 0; }

        /* Banner in Details View */
        .details-banner {
            width: 100%; height: 400px;
            background-size: cover; background-position: center;
            position: relative; display: flex; align-items: flex-end;
            border-bottom: 3px solid #ffd700;
        }
        .details-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #050517, transparent);
        }

        .details-content { max-width: 850px; margin: 30px auto; position: relative; z-index: 10; padding: 0 25px; }
        .details-content h1 { color: #ffd700; font-size: 2.8rem; margin-bottom: 20px; text-shadow: 2px 2px 10px #000; }
        .details-content p { font-size: 1.25rem; line-height: 1.9; color: #eee; white-space: pre-line; }
        
        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: #ffd700; color: #000; padding: 12px 25px;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-family: 'Abhaya Libre', serif;
        }

        .btn { padding: 15px 35px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Abhaya Libre', serif; font-size: 1.1rem; font-weight: bold; }
        .gold { background: #ffd700; color: #050517; }
        .outline { background: transparent; color: #ffd700; border: 2px solid #ffd700; margin-top: 15px; }

        footer { text-align: center; padding: 50px; color: #555; background: #02020a; }
    </style>
</head>
<body>

    <!-- Main Section -->
    <div id="main-content">
        <section class="hero">
            <h1 style="font-size: 4.5rem; color: #ffd700; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,0.8);">සිරි වෙසක් මංගල්‍යය</h1>
            <p style="font-size: 1.6rem; letter-spacing: 1px;">2570 සම්බුදු තෙමඟුල නිමිත්තෙනි</p>
            <button class="btn outline" onclick="startExperience()">නැරඹීමට පිවිසෙන්න 🔽</button>
        </section>

        <section id="video-sec">
            <div class="video-container" id="vid-holder"></div>
            <div class="overlay"></div>
            <div style="z-index: 5; text-align: center;">
                <button class="btn gold" onclick="playMusic()">🎶 "බුදු කරුණා" සින්දුව අසන්න</button><br>
                <button class="btn outline" onclick="document.getElementById('facts').scrollIntoView()">තෙමඟුලේ විස්තර කියවන්න 🔽</button>
            </div>
            <div id="audio-box"></div>
        </section>

        <section id="facts" class="facts-page">
            <h2 style="color: #ffd700; font-size: 2.8rem; margin-bottom: 50px;">උතුම් සම්බුදු තෙමඟුල</h2>
            <div class="grid">
                <!-- Card 1 -->
                <div class="card c1" onclick="showDetails('birth')">
                    <h3 style="font-size: 1.8rem; text-shadow: 2px 2px 5px #000;">බෝසත් කුමරුගේ උත්පත්තිය</h3>
                    <div style="background:#ffd700; color:#000; padding:8px 20px; border-radius:25px; width:fit-content; font-weight:bold;">විස්තර කියවන්න</div>
                </div>
                <!-- Card 2 -->
                <div class="card c2" onclick="showDetails('enlighten')">
                    <h3 style="font-size: 1.8rem; text-shadow: 2px 2px 5px #000;">සම්මා සම්බුද්ධත්වය</h3>
                    <div style="background:#ffd700; color:#000; padding:8px 20px; border-radius:25px; width:fit-content; font-weight:bold;">විස්තර කියවන්න</div>
                </div>
                <!-- Card 3 -->
                <div class="card c3" onclick="showDetails('death')">
                    <h3 style="font-size: 1.8rem; text-shadow: 2px 2px 5px #000;">මහා පිරිනිවන් පෑම</h3>
                    <div style="background:#ffd700; color:#000; padding:8px 20px; border-radius:25px; width:fit-content; font-weight:bold;">විස්තර කියවන්න</div>
                </div>
            </div>
        </section>

        <footer>Developed by M.U.R.D.D. Fonseka | Ziyumi Beat Studio 2026</footer>
    </div>

    <!-- Details View Page -->
    <div id="details-page">
        <button class="back-btn" onclick="hideDetails()">⬅ ආපසු පිටුවට</button>
        <div id="det-banner" class="details-banner"></div>
        <div class="details-content">
            <h1 id="det-title"></h1>
            <p id="det-text"></p>
        </div>
    </div>

    <script>
        const data = {
            birth: {
                title: "බෝසත් කුමරුගේ උත්පත්තිය",
                img: "birth.jpg",
                text: "සිදුහත් කුමරු (සිද්ධාර්ථ) වෙසක් පුර පසළොස්වක පොහොය දිනක නේපාලයේ ලුම්බිණි සල් උයනේදී මහාමායා දේවියට සහ සුද්ධෝදන රජුට දාව උපත ලැබීය.\n\n• ස්ථානය: ලුම්බිණි සල් උයන (වත්මන් නේපාලයේ රුමින්දායි).\n• මව: මහාමායා දේවිය | පියා: සුද්ධෝදන රජු.\n• ප්‍රධාන සිදුවීම: උපන් විගස සත් පියුමන් මතින් ඇවිද ගොස්, 'අග්ගෝ හමස්‌මි ලෝකස්‌ස' (ลොවට අග්‍ර වෙමි) ආදී වශයෙන් සිංහනාද කළ සේක.\n• අනාවැකිය: අසිත තවුසා විසින් මෙම කුමරු සක්විති රජෙකු හෝ සම්මා සම්බුදු කෙනෙකු වන බවට අනාවැකි පළ කළේය."
            },
            enlighten: {
                title: "සම්මා සම්බුද්ධත්වයට පත්වීම",
                img: "images.jpg",
                text: "සිද්ධාර්ථ ගෞතම බෝසතාණන් වහන්සේ බුද්ධත්වයට පත්වීම බෞද්ධ ඉතිහාසයේ උත්තරීතරම සිදුවීමයි.\n\n• මධ්‍යම ප්‍රතිපදාව: අන්ත දෙකෙන් මිදී ආර්ය අෂ්ටාංගික මාර්ගය හෙවත් මධ්‍යම ප්‍රතිපදාව අනුගමනය කළහ.\n• බෝධි මූලය: නේරංජනා නදිය අසබඩ වූ ඇසතු බෝධීන් වහන්සේ යට වැඩ සිටිමින්, ආනාපානසති භාවනාවෙහි නිරත වූහ.\n• මාර පරාජය: පාරමිතා බලයෙන් වසවර්ති මාරයා පරාජය කළහ.\n• බුද්ධත්වය: වෙසක් පුර පසළොස්වක පොහෝ දිනක, සියලු කෙලෙසුන් නසා උතුම් සම්මා සම්බුද්ධත්වයට පත් වූහ."
            },
            death: {
                title: "මහා පිරිනිවන් පෑම",
                img: "z_p08-Sambuddha_2.jpg",
                text: "බුදුරජාණන් වහන්සේ පංචස්කන්ධය හැර දමා, යලි උපතක් සිදු නොවන පරිදි ක්ලේශයන් සහ සංසාර දුක සම්පූර්ණයෙන්ම නිවා දැමීම පරිනිර්වාණයයි.\n\n• ස්ථානය: කුසිනාරා නුවර උපවත්තන සල් උයන.\n• සිදුවීම: ජන්මයෙන් අසූවැන්න වූ වෙසක් පුර පසළොස්වක පොහෝ දින, සල් ගස් දෙකක් අතර උතුරට හිස දමා සිංහ සෙයියාවෙන් සැතපී අපවත් වූ සේක.\n• අවසාන බුදු වදන: 'මහණෙනි, සියලු සංස්කාර ධර්මයෝ නැසෙන සුලුය. නොපමාව කුසල් දමෙහි යෙදෙන්න.'"
            }
        };

        function showDetails(key) {
            document.getElementById('det-title').innerText = data[key].title;
            document.getElementById('det-text').innerText = data[key].text;
            document.getElementById('det-banner').style.backgroundImage = `url('${data[key].img}')`;
            document.getElementById('details-page').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function hideDetails() {
            document.getElementById('details-page').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function startExperience() {
            document.getElementById('video-sec').scrollIntoView();
            document.getElementById('vid-holder').innerHTML = `<iframe src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=0&start=29" frameborder="0" allow="autoplay"></iframe>`;
        }

        function playMusic() {
            document.getElementById('audio-box').innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
        }
    </script>
</body>
</html>
