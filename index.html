<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: #050517;
            color: #fff;
        }

        /* Full Page Sections */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 1. START PAGE - Hero Image Section */
        .start-page {
            /* ඔයාගේ Hero Image එක මෙතනට බැක්ග්‍රවුන්ඩ් එක විදිහට දැම්මා */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                        url('https://r.jina.ai/i/6f903820464a4b4bb2e20b60e654be07'); 
            background-size: cover;
            background-position: center;
            z-index: 2;
        }

        .start-page h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            margin: 0;
            animation: fadeInDown 2s ease;
        }

        .start-page p {
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            margin-top: 10px;
        }

        /* 2. VIDEO PAGE - YouTube Content */
        .video-page {
            background: linear-gradient(to bottom, #050517, #0d0d2b);
        }

        .video-box {
            width: 85%;
            max-width: 900px;
            aspect-ratio: 16/9;
            border: 4px solid #ffd700;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
        }

        /* UI Elements */
        .scroll-btn {
            position: absolute;
            bottom: 40px;
            color: #ffd700;
            text-decoration: none;
            font-size: 1.3rem;
            animation: bounce 2s infinite;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .play-btn {
            margin-top: 30px;
            background: #ffd700;
            color: #050517;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ffd700; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            padding: 20px;
            background: #02020a;
            text-align: center;
            color: #444;
        }
    </style>
</head>
<body>

    <!-- පළමු පිටුව - සිදුහත් උපත පින්තූරය සමඟ -->
    <section class="start-page">
        <h1>සිරි වෙසක් මංගල්‍යය</h1>
        <p>පින්බර වෙසක් අසිරිය විඳින්න පහළට යන්න...</p>
        <a href="#video-content" class="scroll-btn">දසුන් නැරඹීමට 🔽</a>
    </section>

    <!-- දෙවැනි පිටුව - වීඩියෝව සහ මියුසික් -->
    <section id="video-content" class="video-page">
        <h2 style="color: #ffd700; font-size: 2.5rem; margin-bottom: 25px;">සංවේදී කවි පෙළ</h2>
        
        <div class="video-box">
            <!-- තත්පර 29 සිට පටන් ගන්නා වීඩියෝව -->
            <iframe src="https://www.youtube.com/embed/SBRWnqemVJU?start=29&rel=0" 
                    frameborder="0" allowfullscreen></iframe>
        </div>

        <button class="play-btn" onclick="startMusic()">🎶 "බුදු කරුණා" ගීතය ප්ලේ කරන්න</button>
        <div id="audio-container" style="display:none;"></div>
    </section>

    <footer>
        <p>Created by M.U.R.D.D. Fonseka | Ziyumi Beat Studio 2026</p>
    </footer>

    <script>
        function startMusic() {
            const container = document.getElementById('audio-container');
            container.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            alert("අසිරිමත් වෙසක් ගීතය දැන් වාදනය වේ!");
        }
    </script>

</body>
</html>
