<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden; scroll-behavior: smooth;
            background: #050517; color: #fff;
        }

        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 60px 0; }

        /* Main Image */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://www.lanka.com/wp-content/uploads/2014/06/vesak-festival-sri-lanka.jpg') center/cover; 
            text-align: center; 
        }

        .video-sec { background: #0a0a20; padding: 80px 0; }
        .video-container {
            width: 90%; max-width: 850px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            display: flex; align-items: center; justify-content: center;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; width: 90%; max-width: 1200px; }
        
        .card {
            height: 500px; border-radius: 30px; overflow: hidden; cursor: pointer;
            border: 1px solid rgba(255, 215, 0, 0.15); display: flex; flex-direction: column;
            justify-content: flex-end; padding: 35px; transition: 0.6s;
            background-size: cover; background-position: center;
        }
        .card:hover { transform: scale(1.03); border-color: #ffd700; }
        
        /* New Working Web Image Links */
        .c1 { background-image: linear-gradient(to top, #000, transparent), url('https://images.fineartamerica.com/images/artworkimages/mediumlarge/3/queen-mahasmaya-dream-and-the-birth-of-siddhartha-gautama-vintage-poster-art.jpg'); }
        .c2 { background-image: linear-gradient(to top, #000, transparent), url('https://live.staticflickr.com/5186/5623067784_a48574d6c6_b.jpg'); }
        .c3 { background-image: linear-gradient(to top, #000, transparent), url('https://c1.staticflickr.com/9/8437/7968533816_0f8b17b686_b.jpg'); }

        #details-page { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #050517; z-index: 1000; transition: 0.5s; overflow-y: auto; }
        #details-page.active { left: 0; }
        .details-banner { width: 100%; height: 450px; background-size: cover; background-position: center; border-bottom: 3px solid #ffd700; }
        .details-content { max-width: 850px; margin: -50px auto 50px; padding: 45px; background: #050517; border-radius: 30px; position: relative; box-shadow: 0 -20px 50px rgba(0,0,0,0.8); }
        
        .btn { padding: 15px 40px; border-radius: 60px; border: none; cursor: pointer; font-weight: bold; font-family: 'Abhaya Libre', serif; font-size: 1.2rem; margin: 10px; transition: 0.3s; }
        .gold { background: #ffd700; color: #000; }
        .outline { background: transparent; color: #ffd700; border: 2px solid #ffd700; }

        footer { text-align: center; padding: 60px; color: #444; background: #02020a; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 style="font-size: 4.5rem; color: #ffd700; text-shadow: 0 5px 15px #000; margin-bottom: 10px;">සිරි වෙසක් මංගල්‍යය</h1>
        <p style="font-size: 1.6rem; letter-spacing: 1px; opacity: 0.9;">සම්බුදු තෙමඟුල නිමිත්තෙන් කෙරෙන උපහාරයකි</p>
        <div style="margin-top: 30px;">
            <button class="btn gold" onclick="playVideo()">වීඩියෝව 🎬</button>
            <button class="btn outline" onclick="document.getElementById('facts').scrollIntoView()">තෙමඟුල 📖</button>
        </div>
    </section>

    <section id="video-sec" class="video-sec">
        <div class="video-container" id="player">
            <p style="color: #666;">Play Button එක ක්ලික් කරන්න.</p>
        </div>
    </section>

    <section id="facts">
        <h2 style="color: #ffd700; font-size: 2.8rem; text-align: center; margin-bottom: 60px;">සම්බුදු තෙමඟුල</h2>
        <div class="grid">
            <div class="card c1" onclick="showDetails('birth')">
                <h3 style="font-size: 2rem; text-shadow: 2px 2px 10px #000;">උතුම් උපත</h3>
            </div>
            <div class="card c2" onclick="showDetails('enlighten')">
                <h3 style="font-size: 2rem; text-shadow: 2px 2px 10px #000;">සම්මා සම්බුද්ධත්වය</h3>
            </div>
            <div class="card c3" onclick="showDetails('death')">
                <h3 style="font-size: 2rem; text-shadow: 2px 2px 10px #000;">මහා පිරිනිවන් පෑම</h3>
            </div>
        </div>
    </section>

    <div id="details-page">
        <button class="btn gold" style="position:fixed; top:25px; left:25px; z-index:1100;" onclick="hideDetails()">⬅ ආපසු</button>
        <div id="det-banner" class="details-banner"></div>
        <div class="details-content">
            <h1 id="det-title" style="color: #ffd700; font-size: 2.8rem;"></h1>
            <p id="det-text" style="font-size: 1.3rem; line-height: 1.9; color: #ddd;"></p>
        </div>
    </div>

    <footer>
        Developed by M.U.R.D.D. Fonseka<br>
        <span style="font-size: 0.9rem; opacity: 0.5;">ZIYUMI BEAT STUDIO | 2026</span>
    </footer>

    <script>
        const data = {
            birth: { 
                title: "සිදුහත් කුමරුගේ උපත", 
                img: "https://images.fineartamerica.com/images/artworkimages/mediumlarge/3/queen-mahasmaya-dream-and-the-birth-of-siddhartha-gautama-vintage-poster-art.jpg", 
                text: "වෙසක් පුර පසළොස්වක පොහෝ දිනක ලුම්බිණි සල් උයනේදී සිදුහත් කුමරු ජනිත විය. මෙය මුළු ලෝකයාගේම ශාන්තිය පිණිස සිදු වූ උතුම් උපතකි." 
            },
            enlighten: { 
                title: "උතුම් සම්මා සම්බුද්ධත්වය", 
                img: "https://live.staticflickr.com/5186/5623067784_a48574d6c6_b.jpg", 
                text: "බුද්ධගයාවේදී බෝධි මූලයේදී සය වසරක් දුෂ්කර ක්‍රියා කොට, වෙසක් පුර පසළොස්වක පොහෝ දිනක උතුම් සම්මා සම්බුද්ධත්වය ලැබූ සේක." 
            },
            death: { 
                title: "මහා පිරිනිවන් පෑම", 
                img: "https://c1.staticflickr.com/9/8437/7968533816_0f8b17b686_b.jpg", 
                text: "කුසිනාරා නුවර උපවත්තන සල් උයනේදී වෙසක් පුර පසළොස්වක පොහෝ දිනක බුදුරජාණන් වහන්සේ මහා පිරිනිවන් පෑ සේක." 
            }
        };

        function playVideo() {
            const player = document.getElementById('player');
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/SBRWnqemVJU?start=29&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('video-sec').scrollIntoView();
        }

        function showDetails(key) {
            document.getElementById('det-title').innerText = data[key].title;
            document.getElementById('det-text').innerText = data[key].text;
            document.getElementById('det-banner').style.backgroundImage = `url('${data[key].img}')`;
            document.getElementById('details-page').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function hideDetails() {
            document.getElementById('details-page').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
