<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #050517;
            color: #fff;
            font-family: 'Abhaya Libre', serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 23, 0.5);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            margin: 0;
        }

        .control-panel {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            font-family: 'Abhaya Libre', serif;
        }

        .btn:hover {
            background: #ffd700;
            color: #050517;
        }

        .container {
            padding: 80px 20px;
            background: #050517;
        }

        footer {
            padding: 40px;
            color: #666;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="video-background">
            <!-- වීඩියෝව තත්පර 29 සිට පටන් ගනී (start=29) -->
            <iframe id="vesakVideo" 
                src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=1&loop=1&playlist=SBRWnqemVJU&start=29&controls=0&showinfo=0" 
                frameborder="0" allow="autoplay; encrypted-media">
            </iframe>
        </div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1>සම්බුදු තෙමඟුල</h1>
            <p style="font-size: 1.6rem;">තත්පර 29 සිට ඇරඹෙන පූජනීය දසුන් පෙළ...</p>
            
            <div class="control-panel">
                <!-- සින්දුව පාලනය කරන බටන් එක -->
                <button class="btn" onclick="toggleMusic()">🎶 සින්දුව වාදනය කරන්න</button>
            </div>

            <!-- සින්දුව සඳහා රහසිගත ප්ලේයර් එකක් -->
            <div id="musicPlayer" style="display:none;"></div>
        </div>
    </section>

    <main class="container">
        <h2 style="color: #ffd700; font-size: 2.5rem;">වෙසක් පණිවිඩය</h2>
        <p style="max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.2rem;">
            ලොවට අමා ශාන්තිය උදා කළ සම්මා සම්බුදු රජාණන් වහන්සේගේ තෙමඟුල සිහිපත් කෙරෙන මේ පින්බර වෙසක් සමයේ, 
            සැමට සාමය සහ සැනසීම උදා වේවායි පතමු.
        </p>
    </main>

    <footer>
        <p>&copy; 2026 Developed by M.U.R.D.D. Fonseka | Ziyumi Beat</p>
    </footer>

    <script>
        let isMusicPlaying = false;

        function toggleMusic() {
            const playerDiv = document.getElementById('musicPlayer');
            const btn = document.querySelector('.btn');
            
            if (!isMusicPlaying) {
                // සින්දුව (බුදු කරුණා දෑස තෙමී) ලෝඩ් කිරීම
                playerDiv.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
                btn.innerHTML = "⏸️ සින්දුව නවත්වන්න";
                isMusicPlaying = true;
            } else {
                playerDiv.innerHTML = "";
                btn.innerHTML = "🎶 සින්දුව වාදනය කරන්න";
                isMusicPlaying = false;
            }
        }
    </script>

</body>
</html>
