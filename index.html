<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #050517;
            color: #fff;
            font-family: 'Abhaya Libre', serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section with YouTube Background */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* වීඩියෝ එක ක්ලික් කරන්න බැරි වෙන්න */
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 23, 0.6); /* වීඩියෝ එක මඳක් අඳුරු කරන්න */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            animation: glowText 3s infinite alternate;
        }

        @keyframes glowText {
            from { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            to { text-shadow: 0 0 40px rgba(255, 215, 0, 1); }
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 100px 20px;
            background: #050517;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .event-card:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
        }

        footer {
            padding: 40px;
            background: #02020a;
            color: #666;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="video-background">
            <!-- YouTube video එක මෙතන තියෙනවා. mute=1 නිසා autoplay වැඩ කරනවා. -->
            <iframe src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=1&loop=1&playlist=SBRWnqemVJU&controls=0&showinfo=0&rel=0&modestbranding=1" 
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>සම්බුදු තෙමඟුල</h1>
            <p>සංවේදී කවිපෙළ සමඟින් වෙසක් අසිරිය විඳිමු...</p>
        </div>
    </section>

    <main class="container">
        <div class="event-card">
            <h2 style="color:#ffd700">උපත</h2>
            <p>ලුම්බිණි සල් උයනේදී සිදුහත් කුමරුගේ උපත සිදු විය.</p>
        </div>
        <div class="event-card">
            <h2 style="color:#ffd700">බුදුවීම</h2>
            <p>ගයා ශීර්ෂයේදී උතුම් සම්මා සම්බුද්ධත්වයට පත්වීම.</p>
        </div>
        <div class="event-card">
            <h2 style="color:#ffd700">පිරිනිවීම</h2>
            <p>කුසිනාරා නුවරදී මහා පිරිනිවන් පෑම.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Developed by M.U.R.D.D. Fonseka | Ziyumi Beat</p>
    </footer>

</body>
</html>
