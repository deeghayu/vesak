<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Animated Gradient Background */
        body {
            background: linear-gradient(-45deg, #050517, #0d0d2b, #1a1a4a, #050517);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Star Particles */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Full Page Sections */
        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* Page 1 - Hero */
        .hero h1 {
            font-size: 5.5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4);
            margin: 0;
            animation: floatText 3s infinite ease-in-out;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            color: #ffd700;
            text-decoration: none;
            font-size: 1.2rem;
            animation: bounce 2s infinite;
        }

        /* Page 2 - Video */
        .video-page {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .video-box {
            width: 85%;
            max-width: 900px;
            aspect-ratio: 16/9;
            border: 4px solid #ffd700;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.4);
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
        }

        .btn-play {
            margin-top: 30px;
            background: #ffd700;
            color: #050517;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ffd700;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
        }

        footer {
            padding: 30px;
            background: #02020a;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Star Particle Layer -->
    <div class="stars" id="starContainer"></div>

    <!-- Page 1 -->
    <section class="hero">
        <h1>සම්බුදු තෙමඟුල</h1>
        <p style="font-size: 1.8rem; color: #ddd; margin-top: 10px;">පින්බර වෙසක් මංගල්‍යයක් වේවා!</p>
        <a href="#video-section" class="scroll-hint">පහළට යන්න 🔽</a>
    </section>

    <!-- Page 2 -->
    <section id="video-section" class="video-page">
        <h2 style="color: #ffd700; font-size: 2.5rem; margin-bottom: 25px;">සංවේදී දසුන් පෙළ</h2>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=0&start=29&rel=0" 
                    frameborder="0" allowfullscreen></iframe>
        </div>

        <button class="btn-play" onclick="startExperience()">🎶 අසිරිමත් ගීතය ප්ලේ කරන්න</button>
        <div id="audioHost" style="display:none;"></div>
    </section>

    <footer>
        <p>Developed by M.U.R.D.D. Fonseka | Ziyumi Beat | G.C.C. Media unit |G.C.C. It club</p>
    </footer>

    <script>
        // තරු වැස්සක් වගේ පේන්න තරු ජෙනරේට් කරන එක
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            container.appendChild(star);
        }

        function startExperience() {
            const host = document.getElementById('audioHost');
            host.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            alert("දැන් සින්දුව ප්ලේ වෙනවා මචං. පින්බර වෙසක් අසිරිය විඳින්න!");
        }
    </script>

</body>
</html>
