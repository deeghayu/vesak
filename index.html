<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: #050517;
            color: #fff;
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 1. START PAGE - Hero Image */
        .start-page {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('hero.png'); 
            background-size: cover;
            background-position: center;
        }

        .start-page h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: #ffd700;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
            margin: 0;
            animation: fadeIn 2s ease;
        }

        /* 2. FULL SCREEN VIDEO PAGE */
        .video-section {
            background: #000;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .content-box {
            position: relative;
            z-index: 3;
            text-align: center;
        }

        /* Interaction Elements */
        .scroll-btn {
            position: absolute;
            bottom: 40px;
            color: #ffd700;
            text-decoration: none;
            font-size: 1.2rem;
            animation: bounce 2s infinite;
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid #ffd700;
            z-index: 4;
        }

        .play-btn {
            background: #ffd700;
            color: #050517;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transition: 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ffd700;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            padding: 15px;
            background: #02020a;
            text-align: center;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <!-- පළමු පිටුව -->
    <section class="start-page">
        <h1>සිරි වෙසක් මංගල්‍යය</h1>
        <p style="font-size: 1.5rem; text-shadow: 0 2px 10px #000;">පින්බර උපහාරයකි</p>
        <a href="#full-video" class="scroll-btn">දසුන් නැරඹීමට 🔽</a>
    </section>

    <!-- දෙවැනි පිටුව: Full Screen Video Section -->
    <section id="full-video" class="video-section">
        <div class="video-background">
            <!-- තත්පර 29 සිට පටන් ගන්නා Full Screen වීඩියෝව (muted නිසා autoplay වැඩ කරයි) -->
            <iframe src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=1&loop=1&playlist=SBRWnqemVJU&start=29&controls=0&showinfo=0&rel=0&modestbranding=1" 
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        
        <div class="overlay"></div>

        <div class="content-box">
            <h2 style="color: #ffd700; font-size: 3rem; margin-bottom: 20px;">සංවේදී කවි පෙළ</h2>
            <button class="play-btn" onclick="playAudio()">🎶 "බුදු කරුණා" ගීතය අසන්න</button>
        </div>

        <div id="audio-container" style="display:none;"></div>
    </section>

    <footer>
        <p>Developed by M.U.R.D.D. Fonseka | Ziyumi Beat Studio 2026</p>
    </footer>

    <script>
        function playAudio() {
            const container = document.getElementById('audio-container');
            // සින්දුව ප්ලේ කිරීම
            container.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            
            const btn = document.querySelector('.play-btn');
            btn.innerHTML = "✨ ගීතය වාදනය වේ...";
            btn.style.background = "rgba(255,255,255,0.9)";
        }
    </script>

</body>
</html>
