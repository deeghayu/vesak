<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Abhaya Libre', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background: #050517;
        }

        section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 1. START PAGE */
        .start-page {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), 
                        url('hero.png'); 
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        .start-page h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            color: #ffd700;
            text-align: center;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        /* 2. FULL SCREEN VIDEO SECTION */
        .video-section {
            background: #000;
        }

        /* මෙන්න මේ කොටස තමයි වීඩියෝ එක Full Screen කරන්නේ */
        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            object-fit: cover; /* වීඩියෝ එක ස්ක්‍රීන් එකට ෆිට් කරනවා */
        }

        /* Aspect ratio එක අනුව වීඩියෝ එකේ සයිස් එක පාලනය කිරීම */
        @media (min-aspect-ratio: 16/9) {
            .video-wrapper iframe { height: 56.25vw; }
        }
        @media (max-aspect-ratio: 16/9) {
            .video-wrapper iframe { width: 177.78vh; }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* වීඩියෝ එක උඩින් ලස්සන අඳුරු ගතියක් */
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        .play-btn {
            background: #ffd700;
            color: #050517;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            transition: 0.3s;
        }

        .scroll-link {
            position: absolute;
            bottom: 30px;
            color: #ffd700;
            text-decoration: none;
            background: rgba(0,0,0,0.6);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #ffd700;
            z-index: 15;
        }

        footer {
            padding: 15px;
            background: #02020a;
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            position: relative;
            z-index: 20;
        }
    </style>
</head>
<body>

    <!-- Page 1 -->
    <section class="start-page">
        <div style="text-align: center;">
            <h1>සිරි වෙසක් මංගල්‍යය</h1>
            <p style="font-size: 1.5rem; text-shadow: 0 2px 10px #000;">පින්බර උපහාරයකි</p>
        </div>
        <a href="#video-full" class="scroll-link">දසුන් නැරඹීමට 🔽</a>
    </section>

    <!-- Page 2: FULL SCREEN VIDEO -->
    <section id="video-full" class="video-section">
        <div class="video-wrapper">
            <!-- වීඩියෝව තත්පර 29 සිට Full Screen ප්ලේ වේ -->
            <iframe src="https://www.youtube.com/embed/SBRWnqemVJU?autoplay=1&mute=1&loop=1&playlist=SBRWnqemVJU&start=29&controls=0&rel=0&modestbranding=1&iv_load_policy=3" 
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
        
        <div class="overlay"></div>

        <div class="content">
            <h2 style="color: #ffd700; font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 20px #000;">සංවේදී කවි පෙළ</h2>
            <button class="play-btn" onclick="playMusic()">🎶 "බුදු කරුණා" ගීතය අසන්න</button>
        </div>

        <div id="music-box" style="display:none;"></div>
    </section>

    <footer>
        <p>Developed by M.U.R.D.D. Fonseka | Ziyumi Beat Studio 2026</p>
    </footer>

    <script>
        function playMusic() {
            const box = document.getElementById('music-box');
            box.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/7Jw9BAZh45w?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            document.querySelector('.play-btn').innerHTML = "✨ ගීතය වාදනය වේ...";
        }
    </script>

</body>
</html>
