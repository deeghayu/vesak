<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සිරි වෙසක් මංගල්‍යය - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0d0d26;
            color: #fff;
            font-family: 'Abhaya Libre', serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Hero Section with Drive Video Background */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 4rem;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin: 0;
            animation: fadeInDown 1.5s ease-out;
        }

        .hero-content p {
            font-size: 1.5rem;
            color: #f0f0f0;
            animation: fadeInUp 2s ease-out;
        }

        /* Cards and Sections */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 80px 20px;
            background: #0d0d26;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .event-card:hover {
            transform: translateY(-15px);
            border-color: #ffd700;
        }

        .icon { font-size: 4rem; margin-bottom: 15px; }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            padding: 40px;
            background: #050517;
            color: #888;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-overlay"></div>
        <video autoplay muted loop playsinline id="bgVideo">
            <!-- ඔයාගේ Direct Link එක මෙන්න -->
            <source src="https://drive.google.com/uc?export=download&id=1rc9FVJKUHyQgQUMTPzAwKe5IsCYAufeg" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
        <div class="hero-content">
            <h1>සම්බුදු තෙමඟුල</h1>
            <p>සංවේදී කවිපෙළ සමඟින් වෙසක් අසිරිය විඳිමු...</p>
        </div>
    </section>

    <main class="container">
        <div class="event-card">
            <div class="icon">🌸</div>
            <h2>උපත</h2>
            <p>ලුම්බිණි සල් උයනේදී සිදුහත් කුමරුගේ උපත සිදු විය.</p>
        </div>
        <div class="event-card">
            <div class="icon">🧘</div>
            <h2>බුදුවීම</h2>
            <p>ගයා ශීර්ෂයේදී උතුම් සම්මා සම්බුද්ධත්වයට පත්වීම.</p>
        </div>
        <div class="event-card">
            <div class="icon">☸️</div>
            <h2>පිරිනිවීම</h2>
            <p>කුසිනාරා නුවරදී මහා පිරිනිවන් පෑම.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Developed by M.U.R.D.D. Fonseka</p>
    </footer>

</body>
</html>
